name: Run tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install ".[dev]"
        working-directory: sdk

      - name: Ruff check
        run: ruff check taco/ tests/
        working-directory: sdk

      - name: Ruff format check
        run: ruff format --check taco/ tests/
        working-directory: sdk

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install ".[dev]"
        working-directory: sdk

      - name: Mypy
        run: mypy taco/
        working-directory: sdk

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install SDK with test dependencies
        run: pip install ".[test]"
        working-directory: sdk

      - name: Run tests
        run: pytest -v
        working-directory: sdk
